<div class="min-h-screen bg-gray-900">
  <!-- Header -->
  <header class="bg-gray-800 shadow-lg border-b border-gray-700">
    <div class="mx-auto px-4 py-4">
      <h1 class="text-2xl font-bold text-white">{{ title() }}</h1>
    </div>
  </header>

  <!-- Main Content -->
  <main class="mx-auto px-4 py-8">
    <div class="flex flex-col lg:flex-row gap-8 justify-center items-start">
      <div class="flex flex-col gap-8 w-full lg:w-1/2">
        <!-- Document Upload -->
        <div class="bg-gray-800 rounded-xl shadow-2xl p-6 border border-gray-700">
          <h2 class="text-xl font-semibold text-white mb-4">Upload Documents</h2>
          <app-document-upload (uploadComplete)="onDocumentUploaded($event)"></app-document-upload>
        </div>

        <!-- Document List -->
        <div class="bg-gray-800 rounded-xl shadow-2xl p-6 border border-gray-700" *ngIf="documentsUploaded()">
          <h3 class="text-xl font-semibold text-white mb-4">Documents ({{ documentCount() }})</h3>
          <div class="space-y-3">
            <div *ngFor="let doc of uploadedDocuments(); trackBy: trackByDocument" class="text-sm text-gray-300 bg-gray-700/50 p-3 rounded-lg">
              {{ doc.name }} ({{ doc.chunksCount }} chunks)
            </div>
          </div>
        </div>
      </div>

      <!-- Chat Interface -->
      <div class="bg-gray-800 rounded-xl shadow-2xl p-6 border border-gray-700 w-full lg:w-1/2">
        <h2 class="text-xl font-semibold text-white mb-4">Chat</h2>
        <app-chat [documentsReady]="documentsUploaded()"></app-chat>
      </div>
    </div>
  </main>
</div>
